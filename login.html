<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión — ShopNow</title>
  <link rel="stylesheet" href="auth.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>

  <header class="navbar">
    <div class="nav-inner">
      <a href="index.html" class="logo">Shop<span>Now</span></a>
      <a href="index.html" class="nav-back">
        <i class="fa-solid fa-arrow-left"></i> Volver a la tienda
      </a>
    </div>
  </header>

  <main class="auth-page">
    <div class="auth-orb auth-orb-1"></div>
    <div class="auth-orb auth-orb-2"></div>

    <div class="auth-card">
      <a href="index.html" class="auth-logo">Shop<span>Now</span></a>
      <p class="auth-subtitle">Tu tienda de confianza</p>
      <h1 class="auth-title">Iniciar Sesión</h1>

      <div class="auth-alert" id="authAlert"></div>

      <form id="loginForm" onsubmit="handleLogin(event)" novalidate>

        <div class="field">
          <label for="email">Correo electrónico</label>
          <div class="field-wrap">
            <i class="fa-solid fa-envelope field-icon"></i>
            <input type="email" id="email" placeholder="ejemplo@correo.com"
              autocomplete="email" />
          </div>
          <p class="field-error" id="emailError">Ingresa un correo válido.</p>
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <div class="field-wrap">
            <i class="fa-solid fa-lock field-icon"></i>
            <input type="password" id="password" placeholder="Tu contraseña"
              autocomplete="current-password" />
            <button type="button" class="toggle-pw"
              onclick="togglePassword('password', this)" tabindex="-1">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
          <p class="field-error" id="passwordError">Ingresa tu contraseña.</p>
        </div>

        <div class="field-options">
          <label class="checkbox-wrap">
            <input type="checkbox" id="remember" />
            <span>Recordarme</span>
          </label>
          <a href="#">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="btn-auth" id="submitBtn">
          <i class="fa-solid fa-right-to-bracket"></i>
          <span class="btn-text">Iniciar Sesión</span>
        </button>
        <div style="text-align:center; margin-top:12px">
          <a href="forgot-password.html" style="color:var(--primary,#e8520a); font-size:0.88rem; text-decoration:none">
            ¿Olvidaste tu contraseña?
          </a>
        </div>
      </form>

      <div class="auth-divider">o continúa con</div>

      <div class="social-btns">
        <button class="btn-social"
          onclick="showSocialNotice()">
          <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" />
          Google
        </button>
        <button class="btn-social"
          onclick="showSocialNotice()">
          <i class="fa-brands fa-facebook-f" style="color:#1877f2;font-size:1rem"></i>
          Facebook
        </button>
      </div>

      <p class="auth-footer">
        ¿No tienes cuenta? <a href="register.html">Crear cuenta gratis</a>
      </p>
    </div>
  </main>

  <script src="auth.js"></script>
</body>
</html>
